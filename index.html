<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oh-my-hermes-app</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1f1b4e 40%, #23215a 70%, #0f0c29 100%);
      color: #e4e4e7;
      line-height: 1.6;
    }

    .container {
      text-align: center;
      max-width: 640px;
      padding: 48px 24px;
    }

    .emoji-icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(to right, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 18px;
      color: #a1a1aa;
      margin-bottom: 32px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(to right, #a78bfa, #60a5fa);
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    p {
      font-size: 15px;
      color: #a1a1aa;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      background: linear-gradient(to right, #7c3aed, #3b82f6);
      border: none;
      border-radius: 8px;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
    }

    .footer-link {
      display: inline-block;
      margin-top: 48px;
      font-size: 13px;
      color: #52525b;
      text-decoration: none;
      transition: color .15s;
    }

    .footer-link:hover {
      color: #a1a1aa;
    }

    @media (max-width: 480px) {
      h1 { font-size: 32px; }
      .tagline { font-size: 16px; }
      .container { padding: 32px 16px; }
    }
  </style>
</head>
